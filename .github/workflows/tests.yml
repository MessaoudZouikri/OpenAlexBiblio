name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Python ${{ matrix.python-version }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
        os: [ubuntu-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt -r requirements-test.txt

      - name: Run tests
        run: pytest --cov --junitxml=junit.xml -o junit_family=legacy

      - name: Install Codecov CLI
        if: matrix.python-version == '3.11'
        run: pip install codecov-cli

      - name: Upload test results to Codecov
        if: matrix.python-version == '3.11'
        run: codecovcli do-upload --report-type test_results --file junit.xml
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        run: codecovcli upload-process
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install lint tools
        run: pip install "black==24.4.2" "ruff==0.4.4"

      - name: Check formatting (black)
        run: black --check src/ tests/

      - name: Check linting (ruff)
        run: ruff check src/ tests/
