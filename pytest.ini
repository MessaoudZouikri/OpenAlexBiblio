[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    --strict-markers
    --strict-config
    --cov=src
    --cov-report=html:htmlcov
    --cov-report=term-missing
    --cov-report=xml
    --cov-fail-under=85
    -v
    --ignore=tests/test_pipeline_consistency.py
    --ignore=tests/generate_test_data.py
    --ignore=tests/generate_mock_data.py
markers =
    unit: Unit tests for individual functions
    integration: Tests for agent interactions
    robustness: Tests for error handling and edge cases
    regression: Tests to prevent regressions
    slow: Tests that take longer to run
    bibliometric: Domain-specific bibliometric tests
