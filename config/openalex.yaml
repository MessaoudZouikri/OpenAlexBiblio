# ============================================================
# OpenAlex API Configuration
# ============================================================

api:
  base_url: "https://api.openalex.org"
  polite_email: null   # REQUIRED: set to your email to use the polite pool (10 req/s vs 5)
                       # Example: "your.name@institution.edu"
                       # The email is only sent in the HTTP User-Agent header — never stored.
  per_page: 200          # Max per page (API limit)
  rate_limit_delay: 0.15 # Seconds between requests (> 1/10s for polite pool)
  max_retries: 3
  retry_backoff: 2.0     # Exponential backoff multiplier
  timeout: 30            # Request timeout in seconds

queries:
  keywords:
    # Option 1: Single query with boolean OR (recommended for efficiency)
    - term: "populism OR populist OR populists"
      field: "title_and_abstract.search"

    # Option 2: Multiple separate queries (current approach - less efficient)
    # - term: "populism"
    #   field: "title_and_abstract.search"
    # - term: "populist"
    #   field: "title_and_abstract.search"
    # - term: "populists"
    #   field: "title_and_abstract.search"

  filters:
    # Boolean operators supported:
    # - OR: "article OR book-chapter OR dissertation" → includes multiple types
    # - AND: "article AND book-chapter" → requires both (rarely useful)
    # Available types: article, book-chapter, dissertation, preprint, book, dataset, etc.
    type: "article OR book-chapter OR dissertation OR preprint"    # Multiple types
    from_publication_date: "1980-01-01"
    to_publication_date: null  # null = no upper bound
    open_access_only: false

  sort:
    field: "cited_by_count"
    order: "desc"

# Domain → OpenAlex Concept ID Mapping (for rule-based classification)
domain_concepts:
  political_science:
    - "C17744445"    # Political science
    - "C199539241"   # Politics
    - "C150903083"   # Democracy
    - "C2780916012"  # Populism
    - "C2776943663"  # Far-right politics
    - "C108827166"   # Public administration
  economics:
    - "C162324750"   # Economics
    - "C175444787"   # Political economy
    - "C144133560"   # Business
    - "C2778793908"  # Economic inequality
  sociology:
    - "C144024400"   # Sociology
    - "C2778154952"  # Social movement
    - "C523546767"   # Identity politics
    - "C136229726"   # Media studies

