  electoral_politics: ["election", "electoral", "voting", "vote", "ballot"]
  democratic_theory: ["democracy", "democratic", "backsliding", "illiberal"]
  radical_right: ["far-right", "radical right", "extreme right", "right-wing"]
  latin_american_politics: ["latin america", "brazil", "venezuela", "argentina", "mexico", "peru", "chile"]
  european_politics: ["europe", "european", "EU", "france", "germany", "italy", "spain", "netherlands"]
  political_economy: ["political economy", "macroeconomic", "fiscal", "monetary"]
