# ── Subcategory boost rules (configurable keyword affinities) ─
# Each entry boosts the named subcategory when the listed keywords
# appear in title+abstract. Replaces hardcoded boost in stage1_rule.
subcategory_boosts:
  - subcategory: radical_right
    keywords:
      - populism
      - populist
    score: 2
