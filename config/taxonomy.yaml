# ============================================================
# Shared Taxonomy — Single source of truth for all agents
# ============================================================
# Domains, subcategories, keywords, and concept mappings are
# defined here and loaded at runtime by:
#   src/utils/taxonomy.py  →  data_cleaning, classification,
#                              llm_client, validators

# ── Domain → Subcategory mapping ─────────────────────────────
domain_subcategory:
  Political Science:
    - comparative_politics
    - political_theory
    - electoral_politics
    - democratic_theory
    - radical_right
    - latin_american_politics
    - european_politics
  Economics:
    - political_economy
    - redistribution
    - trade_globalization
    - financial_crisis
  Sociology:
    - social_movements
    - identity_politics
    - media_communication
    - culture_values
  Other:
    - international_relations
    - history
    - psychology
    - geography
    - interdisciplinary

