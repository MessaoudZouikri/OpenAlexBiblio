# ============================================================
# Global Pipeline Configuration
# A Bibliometric Analysis Pipeline Using OpenAlex Data
# ============================================================

project:
  name: "populism_bibliometrics"
  version: "0.1.0"
  description: "Bibliometric analysis of populism literature via OpenAlex"

# ---- Paths ------------------------------------------------
paths:
  data_raw: "data/raw"
  data_clean: "data/clean"
  data_processed: "data/processed"
  outputs: "data/outputs"
  logs: "logs"
  checkpoints: "checkpoints"

# ---- Pipeline Execution -----------------------------------
pipeline:
  mode: "full"          # "test" | "full"
  test_max_records: 200  # Records per query in test mode
  full_max_records: null  # null = unlimited, or set to a number for safety (e.g. 10000 for a scoped run)
  random_seed: 42
  min_year: 1980        # Earliest publication year to retain (must match from_publication_date in openalex.yaml)

# ---- Network Analysis Thresholds --------------------------
# min_shared_refs: minimum shared references to draw a bibliographic coupling edge.
#   Auto-scaled by corpus size when set to null:
#     n < 5 000  → 2    (keep sparse networks visible)
#     n < 15 000 → 3
#     n < 30 000 → 5
#     n ≥ 30 000 → 10   (avoid 1.6B-pair explosion on full corpus)
# Override by setting an explicit integer here.
network:
  min_shared_refs: null          # null = auto-scale
  min_cocitations: null          # null = auto-scale (same breakpoints)
  vos_threshold: 1.0             # Association-strength cutoff (keep 1.0 for most runs)
  subfield_analysis: false       # Set true to build per-subcategory networks (slow on large corpora)

# ---- Clustering Configuration ---------------------------
clustering:
  method: auto                   # "auto" | "spectral" | "louvain"
  n_clusters: null               # null = auto-estimated from sqrt(n/2)
  lcc_threshold: 0.95            # Below this fraction, fall back to Louvain
  random_state: 42
  save_metadata: true            # Persist clustering diagnostics

# ---- Step Definitions (ordered) --------------------------
steps:
  - name: data_collection
    enabled: true
    script: "src/agents/data_collection.py"
  - name: validate_raw
    enabled: true
    script: "src/agents/validation/data_validator.py"
    stage: "D1"
  - name: data_cleaning
    enabled: true
    script: "src/agents/data_cleaning.py"
  - name: validate_clean
    enabled: true
    script: "src/agents/validation/data_validator.py"
    stage: "D2"
  - name: bibliometric_analysis
    enabled: true
    script: "src/agents/bibliometric_analysis.py"
  - name: validate_statistical
    enabled: true
    script: "src/agents/validation/statistical_validator.py"
  - name: classification
    enabled: true
    script: "src/agents/classification.py"
  - name: validate_classification
    enabled: true
    script: "src/agents/validation/classification_validator.py"
  - name: network_analysis
    enabled: true
    script: "src/agents/network_analysis.py"
  - name: validate_network
    enabled: true
    script: "src/agents/validation/network_validator.py"
  - name: visualization
    enabled: true
    script: "src/agents/visualization.py"

# ---- Logging ----------------------------------------------
logging:
  level: "INFO"           # DEBUG | INFO | WARNING | ERROR
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
  file_per_agent: true
  console: true

# ---- Failure Handling -------------------------------------
failure:
  on_validation_fail: "halt"    # halt | warn | skip
  on_agent_error: "halt"
  max_retries: 2
